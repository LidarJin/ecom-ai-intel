name: Generate Feeds

on:
  schedule:
    # Weekly on Sunday at 6am UTC (before Monday morning digest)
    - cron: '0 6 * * 0'
  workflow_dispatch:
    inputs:
      mode:
        description: 'What to fetch'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - tweets-only
          - linkedin-only
          - social-only
          - blogs-only

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: cd scripts && npm install

      - name: Generate feeds
        env:
          BRIGHTDATA_API_TOKEN: ${{ secrets.BRIGHTDATA_API_TOKEN }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.mode }}" != "all" ]; then
            cd scripts && node generate-feed.js --${{ inputs.mode }}
          else
            cd scripts && node generate-feed.js
          fi

      - name: Commit and push feeds
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add feed-x.json feed-linkedin.json feed-blogs.json state-feed.json
          git diff --cached --quiet || git commit -m "chore: update feeds [skip ci]"
          git push
